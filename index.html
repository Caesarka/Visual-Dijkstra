    function initializeGraph() {
        startId = 1;

        history.length = 0;
        processed.clear();

        for (const cityId in costs) {
            delete costs[cityId];

                costs[cityId] = Infinity;

    // Dijkstra

    const costs = {};
    const parents = {};
    const processed = new Set();
    const history = [];
    const country = document.getElementById("countries").value;
    graph = canada;

    for (const cityId in graph) {
        costs[cityId] = Infinity;
        parents[cityId] = null;
    }

    costs[startId] = 0;

    currentNodeId = findLowestCostNode();

    function findLowestCostNode() {
        let lowest_cost = Infinity;
        let lowest_node = null;
        for (const cityId in costs) {
            if (costs[cityId] < lowest_cost && !processed.has(cityId)) {
                lowest_cost = costs[cityId];
                lowest_node = cityId;
            }
        }
        return lowest_node;
    }

    function findShortestPathDijkstra(){
        history.push({
            costs: {...costs},
            parents: {...parents},
            processed: new Set(processed),
            currentNodeId: currentNodeId,
        });

        if (currentNodeId == null) {
            console.log("Finished");
            const path = findShortestPath(parents);
            console.log("Path", path);
            return;
        }

        console.log("Processing: ", currentNodeId);

            for (const neighbourId of graph[currentNodeId].links) {
                const new_cost = costs[currentNodeId] + getDistance(currentNodeId, neighbourId);
                if (new_cost < costs[neighbourId]) {
                    costs[neighbourId] = new_cost;
                    parents[neighbourId] = currentNodeId;
                    console.log("Updated ", neighbourId, "cost:", new_cost);
                };
            }
            processed.add(currentNodeId);
            currentNodeId = findLowestCostNode();
            render();

            console.log(costs);
            console.log(parents);
        }

    function render() {
        renderNodes();
        renderEdges();
    }

    function renderNodes(){
        for (const cityId in graph) {
            const circle = document.getElementById(cityId);
            circle.style.stroke = "black";
            circle.style.strokeWidth = "1";

            if (processed.has(cityId)) {
                circle.style.stroke = "green";
                circle.style.strokeWidth = "3";
            }

            if (cityId == currentNodeId) {
                circle.style.stroke = "orange";
                circle.style.strokeWidth = "4"
            }
        }
}

    function makeStepBack() {
        if (history.length == 0) {
            return;
        }
        const state = history.pop();

        Object.assign(costs, state.costs);
        Object.assign(parents, state.parents);

        processed.clear();

        for (const node of state.processed) {
            processed.add(node);
        }

        currentNodeId = state.currentNodeId;
        render();
    }

    function findShortestPath() {
        let node = endId;
        const path = [];
        while (node != null) {
            path.push(node);
            node = parents[node];
        }
        path.reverse();
        console.log(costs);
        console.log(parents);

        return path
    }

    function highlightEdge(fromId, toId) {
        const id1 = `edge-${fromId}-${toId}`;
        const id2 = `edge-${toId}-${fromId}`;

        const line = document.getElementById(id1) || document.getElementById(id2);

        if (line) {
            line.setAttribute("stroke", "green");
            line.setAttribute("stroke-width", "4");
        }
    }

    function renderFinalPath() {
        const path = findShortestPath();

        for (let i = 0; i < path.length - 1; i++) {
            highlightFinalPath(path[i], path[i + 1]);
        }
    }

    function highlightFinalPath(fromId, toId) {
        const id1 = `edge-${fromId}-${toId}`;
        const id2 = `edge-${toId}-${fromId}`;

        const line = document.getElementById(id1) || document.getElementById(id2);

        if (line) {
            line.setAttribute("stroke", "red");
            line.setAttribute("stroke-width", "4");
        }
    }

    function renderEdges() {
        resetAllEdges();

        for(const cityId in parents) {
            const parent = parents[cityId];

            if (parent != null) {
                highlightEdge(parent, cityId);
            }
        }
    }

    function resetAllEdges() {
        const lines = document.querySelectorAll("line");

        for (const line of lines) {
            line.setAttribute("stroke", "black");
            line.setAttribute("stroke-width", "1");
        }
    }


    function getDistance(fromId, toId) {
        const from = graph[fromId];
        const to = graph[toId];
        return Math.round(
            Math.sqrt(
                (to.x - from.x) ** 2 +
                (to.y - from.y) ** 2
                )
            );
    }
